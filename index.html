<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Tools Suite</title>
    <link rel="stylesheet" href="./dist/index.css" />
    <script defer src="./dist/index.js"></script>
  </head>
  <body>
    <header class="header">
      <h1>Dev Tools Suite</h1>
    </header>

    <div class="app-container">
      <nav class="sidebar">
        <div class="sidebar-header">
          <h3>Tools</h3>
        </div>
        <ul class="tool-list">
          <li><button class="tool-btn active" data-tool="diff">Text Diff</button></li>
          <li><button class="tool-btn" data-tool="base64">Base64 Encoder</button></li>
          <li><button class="tool-btn" data-tool="js-minifier">JS Minifier</button></li>
          <li><button class="tool-btn" data-tool="css-minifier">CSS Minifier</button></li>
          <li><button class="tool-btn" data-tool="json-formatter">JSON Formatter</button></li>
        </ul>
      </nav>

      <main class="main-container">
        <!-- Text Diff Tool -->
        <div class="tool-content active" id="tool-diff">
          <section class="input-section">
            <div class="controls-panel">
              <div class="file-upload-section">
                <div class="upload-group">
                  <label for="file1-upload" class="upload-label">Upload File 1:</label>
                  <input
                    type="file"
                    id="file1-upload"
                    accept=".txt,.js,.ts,.json,.html,.css,.md,.py,.java,.cpp,.c,.h"
                  />
                </div>
                <div class="upload-group">
                  <label for="file2-upload" class="upload-label">Upload File 2:</label>
                  <input
                    type="file"
                    id="file2-upload"
                    accept=".txt,.js,.ts,.json,.html,.css,.md,.py,.java,.cpp,.c,.h"
                  />
                </div>
              </div>

              <div class="diff-options">
                <div class="option-group">
                  <label class="option-label">
                    <input id="inline" type="checkbox" />
                    <span>Inline View</span>
                  </label>
                </div>
                <div class="option-group">
                  <label for="syntax-mode" class="option-label">Syntax:</label>
                  <select id="syntax-mode">
                    <option value="text/plain">Plain Text</option>
                    <option value="javascript">JavaScript</option>
                    <option value="typescript">TypeScript</option>
                    <option value="css">CSS</option>
                    <option value="htmlmixed">HTML</option>
                    <option value="markdown">Markdown</option>
                    <option value="python">Python</option>
                    <option value="clike">C/C++/Java</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="text-container">
              <div class="text-panel">
                <div class="text-header">
                  <span class="text-title">Text 1</span>
                  <span class="text-info" id="text1-info">0 lines</span>
                </div>
                <div id="text1" class="text"></div>
              </div>
              <div class="text-panel">
                <div class="text-header">
                  <span class="text-title">Text 2</span>
                  <span class="text-info" id="text2-info">0 lines</span>
                </div>
                <div id="text2" class="text"></div>
              </div>
            </div>

            <div class="action-buttons">
              <button id="compare" class="compare-btn">Compare</button>
              <button id="clear" class="clear-btn">Clear</button>
            </div>
          </section>

          <section class="diff-section">
            <div class="diff-header">
              <h2>Comparison Result</h2>
              <div class="diff-stats" id="diff-stats"></div>
            </div>
            <div id="diff" class="diff-container"></div>
          </section>
        </div>

        <!-- Base64 Tool -->
        <div class="tool-content" id="tool-base64">
          <section class="tool-section">
            <h2>Base64 Encoder/Decoder</h2>
            <div class="base64-container">
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Input Text</h3>
                  <div class="base64-controls">
                    <button id="encode-btn" class="action-btn">Encode</button>
                    <button id="decode-btn" class="action-btn">Decode</button>
                    <button id="clear-base64" class="clear-btn">Clear</button>
                  </div>
                </div>
                <textarea id="base64-input" placeholder="Enter text to encode or base64 to decode..."></textarea>
              </div>
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Output</h3>
                  <button id="copy-base64" class="copy-btn">Copy</button>
                </div>
                <textarea id="base64-output" readonly placeholder="Result will appear here..."></textarea>
              </div>
            </div>
          </section>
        </div>

        <!-- JS Minifier Tool -->
        <div class="tool-content" id="tool-js-minifier">
          <section class="tool-section">
            <h2>JavaScript Minifier/Beautifier</h2>
            <div class="minifier-container">
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Input JavaScript</h3>
                  <div class="minifier-controls">
                    <button id="minify-js-btn" class="action-btn">Minify</button>
                    <button id="beautify-js-btn" class="action-btn">Beautify</button>
                    <button id="clear-js" class="clear-btn">Clear</button>
                  </div>
                </div>
                <div id="js-input" class="code-editor"></div>
              </div>
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Output</h3>
                  <button id="copy-js" class="copy-btn">Copy</button>
                </div>
                <div id="js-output" class="code-editor"></div>
              </div>
            </div>
          </section>
        </div>

        <!-- CSS Minifier Tool -->
        <div class="tool-content" id="tool-css-minifier">
          <section class="tool-section">
            <h2>CSS Minifier/Beautifier</h2>
            <div class="minifier-container">
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Input CSS</h3>
                  <div class="minifier-controls">
                    <button id="minify-css-btn" class="action-btn">Minify</button>
                    <button id="beautify-css-btn" class="action-btn">Beautify</button>
                    <button id="clear-css" class="clear-btn">Clear</button>
                  </div>
                </div>
                <div id="css-input" class="code-editor"></div>
              </div>
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Output</h3>
                  <button id="copy-css" class="copy-btn">Copy</button>
                </div>
                <div id="css-output" class="code-editor"></div>
              </div>
            </div>
          </section>
        </div>

        <!-- JSON Formatter Tool -->
        <div class="tool-content" id="tool-json-formatter">
          <section class="tool-section">
            <h2>JSON Formatter/Minifier</h2>
            <div class="json-container">
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Input JSON</h3>
                  <div class="json-controls">
                    <button id="format-json-btn" class="action-btn">Format</button>
                    <button id="minify-json-btn" class="action-btn">Minify</button>
                    <button id="validate-json-btn" class="action-btn">Validate</button>
                    <button id="clear-json" class="clear-btn">Clear</button>
                  </div>
                </div>
                <div id="json-input" class="code-editor"></div>
              </div>
              <div class="input-output-panel">
                <div class="panel-header">
                  <h3>Output</h3>
                  <button id="copy-json" class="copy-btn">Copy</button>
                </div>
                <div id="json-output" class="code-editor"></div>
              </div>
            </div>
            <div id="json-error" class="error-message"></div>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
